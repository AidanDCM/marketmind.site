# MarketMind Database Migrations Configuration
# 
# This file configures Alembic for database migrations.
# The actual database URL is loaded from environment variables in env.py

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions/ directory
sourceless = false

# Version location specification; This defaults to alembic/versions.
# version_path_suffix = %(module)s/versions

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# Disable SQL echo by default
sqlalchemy.echo = false

# Use SQLite for local development by default
# This can be overridden by the DB_URL environment variable in env.py
sqlalchemy.url = sqlite:///./marketmind.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
