[pytest]
testpaths = 
    tests/test_database_models.py
    test_db_setup.py

python_files = test_*.py
python_functions = test_*
python_classes = Test*

addopts = 
    -v
    --cov=packages/database
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80

filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore:.*PydanticDeprecatedSince20.*
