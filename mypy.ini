[mypy-packages.database.*]
ignore_errors = True

[mypy-packages.orders.*]
ignore_errors = True

[mypy-packages.services.*]
ignore_errors = True

[mypy-packages.connectors.*]
ignore_errors = True
[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unreachable = True
strict_optional = True
no_implicit_optional = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
show_error_codes = True
pretty = True
exclude = (?x)(^third_party/|^packages/models/|^tests/|^apps/|^packages/shared/tests/)
files = 
    packages/shared
    packages/database
    packages/connectors
    packages/pricing
    packages/orders
    packages/services
    scripts
explicit_package_bases = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-uvicorn.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-starlette.*]
ignore_missing_imports = True

[mypy-celery.*]
ignore_missing_imports = True

[mypy-celery.schedules.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True

# Optional integrations and SDKs (type stubs not installed in dev env)
[mypy-google.*]
ignore_missing_imports = True

[mypy-googleapiclient.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-botocore.*]
ignore_missing_imports = True

# Internal adapter namespaces that may be optional
[mypy-packages.shared.adapters.*]
ignore_missing_imports = True

[mypy-scripts.*]
ignore_errors = True

[mypy-packages.shared.*]
ignore_errors = True

[mypy-packages.services.governance.*]
ignore_errors = True

[mypy-packages.shared.tests.*]
ignore_errors = True

[mypy-tests.*]
ignore_errors = True

[mypy-apps.*]
ignore_errors = True

[mypy-third_party.*]
ignore_errors = True
