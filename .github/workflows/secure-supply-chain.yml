name: Secure Supply Chain & Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install ruff mypy bandit pip-audit pytest pytest-cov

      - name: Lint & type-check
        run: |
          ruff check .
          mypy apps/ || true

      - name: Run tests with coverage
        run: |
          pytest -q --maxfail=1 --disable-warnings --cov=apps --cov-report=xml --cov-fail-under=80

      - name: Bandit security scan
        run: bandit -r apps packages

      - name: Pip-audit vulnerability scan
        run: pip-audit -r requirements.txt || true

      - name: Generate SBOM (CycloneDX) with Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft dir:. -o cyclonedx-json > sbom.cdx.json
        shell: bash

      - name: Secret scan with Gitleaks
        run: |
          docker run --rm -v "$PWD":/work ghcr.io/gitleaks/gitleaks:latest detect --source=/work --no-banner --report-format=json --report-path gitleaks.json || true

      - name: Trivy filesystem scan (vuln/secret/misconfig)
        run: |
          docker run --rm -v "$PWD":/work aquasec/trivy:latest fs \
            --scanners vuln,secret,misconfig \
            --format sarif -o trivy-fs.sarif /work \
            ${FAIL_ON_CRITICAL:+--exit-code 1 --severity CRITICAL}

      - name: Build API image
        run: docker build -f infra/docker/hive-api.Dockerfile -t marketmind-api:ci .

      - name: Build Worker image  
        run: docker build -f infra/docker/hive-worker.Dockerfile -t marketmind-worker:ci .

      - name: Trivy API image scan
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image \
          --format sarif -o trivy-api.sarif marketmind-api:ci \
          ${FAIL_ON_CRITICAL:+--exit-code 1 --severity CRITICAL}

      - name: Trivy Worker image scan
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest image \
          --format sarif -o trivy-worker.sarif marketmind-worker:ci \
          ${FAIL_ON_CRITICAL:+--exit-code 1 --severity CRITICAL}

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: |
            sbom.cdx.json
            gitleaks.json
            trivy-fs.sarif
            trivy-api.sarif
            trivy-worker.sarif
            coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
