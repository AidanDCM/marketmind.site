name: Deploy Console to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: apps/console/package-lock.json
    
    - name: Install dependencies
      run: |
        cd apps/console
        npm ci
    
    - name: Build static export
      run: |
        cd apps/console
        npm run build
        npm run export
      env:
        NEXT_PUBLIC_BASEPATH: /MarketMind
        NEXT_PUBLIC_API_URL: https://api.marketmind.dev
        NEXT_PUBLIC_API_TOKEN: ${{ secrets.API_TOKEN }}
        NODE_ENV: production
    
    - name: Add .nojekyll file
      run: touch apps/console/out/.nojekyll
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: apps/console/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
