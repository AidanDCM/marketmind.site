name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Pytest
        run: python -m pytest -q

  deploy-verify:
    name: Deploy verification (API smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Start API and run verifier
        run: |
          mkdir -p data
          DATABASE_URL=sqlite:///data/ci.db python -m uvicorn marketmind.api.app:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/health
          MARKETMIND_API_BASE=http://127.0.0.1:8000 python scripts/verify_marketmind_deploy.py
          MARKETMIND_API_BASE=http://127.0.0.1:8000 python scripts/check_operator_readiness.py --api

  frontend:
    name: Desktop frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Type-check + build
        run: npm run build
      - name: Unit tests
        run: npm test
