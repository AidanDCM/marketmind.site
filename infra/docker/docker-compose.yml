services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: hive
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ../../
      dockerfile: infra/docker/hive-api.Dockerfile
    env_file: ../../.env
    ports:
      - "8000:8000"
    volumes:
      - ../../packages:/app/packages
      - ../../apps/hive_api:/app/apps/hive_api
      - ../../data:/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/summary"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/hive-worker.Dockerfile
    env_file: ../../.env
    volumes:
      - ../../packages:/app/packages
      - ../../apps/hive_worker:/app/apps/hive_worker
      - ../../data:/data
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-lc", "celery -A apps.hive_worker.celery_app:app inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  console:
    build:
      context: ../../
      dockerfile: infra/docker/console.Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/console:/app/apps/console
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  dbdata:
